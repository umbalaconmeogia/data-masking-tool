services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: masking_test
    ports:
      - "13306:3306"
    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
      - ./test-data:/test-data:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      # Allow LOAD DATA INFILE to read the read-only /test-data mount
      # (a non-empty secure-file-priv would make the entrypoint chown the
      # directory, which fails on a read-only bind mount). Test container only.
      - --secure-file-priv=

  pgsql:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: masking_test
    ports:
      - "15432:5432"
    volumes:
      - ./pgsql-init:/docker-entrypoint-initdb.d:ro
      - ./test-data:/test-data:ro
